version: "3"
services:
  gluetun:
    image: qmcgaw/gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=airvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${GLUETUN_WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PRESHARED_KEY=${GLUETUN_WIREGUARD_PRESHARED_KEY}
      - WIREGUARD_ADDRESSES=${GLUETUN_WIREGUARD_ADDRESSES}
      - SERVER_CITIES=Frankfurt
      - SERVER_COUNTRIES=Germany

    ports:
      # Map qBittorrent WebUI (8080) to Localhost (8090) for the Proxy
      - "127.0.0.1:8090:8080"

    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - WEBUI_PORT=8080
    volumes:
      - qbit_config:/config
      - downloads:/downloads
    # CRITICAL: Route everything through Gluetun
    network_mode: service:gluetun
    depends_on:
      - gluetun
    restart: unless-stopped

volumes:
  qbit_config:
  downloads: