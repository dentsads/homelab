version: '3.8'

services:
  openchamber:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openchamber
    restart: unless-stopped
    network_mode: host
    environment:
      # Connect to the existing OpenCode server with auth in URL
      - OPENCODE_HOST=http://opencode:${OPENCODE_SERVER_PASSWORD}@127.0.0.1:8085
      # Skip starting a local OpenCode instance
      - OPENCODE_SKIP_START=true
      # Server credentials for the OpenCode API
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD}
      # Web UI password
      - UI_PASSWORD=${OPENCHAMBER_UI_PASSWORD}
      # Bind only to localhost (Caddy handles TLS/ingress)
      - OPENCHAMBER_HOST=127.0.0.1
      # GitHub SSH key for git operations
      - GITHUB_SSH_PRIVATE_KEY_B64=${GITHUB_SSH_PRIVATE_KEY_B64}
      # GitHub Personal Access Token for gh CLI authentication
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - openchamber_config:/home/openchamber/.config/openchamber
      - openchamber_opencode_data:/home/openchamber/.local/share/opencode
      - openchamber_opencode_state:/home/openchamber/.local/state/opencode
      - openchamber_opencode_config:/home/openchamber/.config/opencode
      - openchamber_ssh:/home/openchamber/.ssh
      # Docker socket for act CLI
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared workspace with OpenCode server
      - ../../../data/workspaces:/home/openchamber/workspaces

volumes:
  openchamber_config:
  openchamber_opencode_data:
  openchamber_opencode_state:
  openchamber_opencode_config:
  openchamber_ssh:
