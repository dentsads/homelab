version: '3.8'

services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencode-server
    restart: unless-stopped
    environment:
      # OpenRouter API Key for LLM access
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # Server authentication
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD}
      - OPENCODE_SERVER_USERNAME=opencode
      # GitHub SSH key for git operations
      - GITHUB_SSH_PRIVATE_KEY_B64=${GITHUB_SSH_PRIVATE_KEY_B64}
      # GitHub Personal Access Token for gh CLI authentication
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    ports:
      # Bind to localhost only - Caddy will proxy
      - "127.0.0.1:8085:8085"
    volumes:
      # Persistent storage for OpenCode config and auth
      - opencode_config:/root/.local/share/opencode
      # Docker socket for docker/act CLI
      - /var/run/docker.sock:/var/run/docker.sock
      # Working directory for repositories (shared with OpenChamber)
      - ../../../data/workspaces:/home/openchamber/workspaces
      # Pre-configured opencode.json
      - ./config/opencode.json:/root/.config/opencode/opencode.json:ro
    working_dir: /home/openchamber/workspaces
    # Run the web server
    command: ["web", "--port", "8085", "--hostname", "0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - \"http://opencode:$OPENCODE_SERVER_PASSWORD@127.0.0.1:8085/global/health\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  opencode_config:
