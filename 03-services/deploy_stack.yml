---
- name: Deploy Docker Stack
  hosts: docker_nodes
  become: yes
  vars:
    # Passed via CLI: stack_name (e.g. "core")
    remote_stacks_dir: /opt/stacks
  
  tasks:
    - name: Fail if stack name is missing
      fail:
        msg: "You must provide a 'stack_name' variable."
      when: stack_name is undefined

    - name: Ensure stack directory exists
      file:
        path: "{{ remote_stacks_dir }}/{{ stack_name }}"
        state: directory
        owner: debian
        group: docker
        mode: '0775'

    - name: Sync Stack Files
      # Copies everything from 03-services/stacks/<name>/ to /opt/stacks/<name>/
      copy:
        src: "stacks/{{ stack_name }}/"
        dest: "{{ remote_stacks_dir }}/{{ stack_name }}/"
        owner: debian
        group: docker
        mode: '0644'
        # Ensure directories inside are executable
        directory_mode: '0755'

    - name: Inject Stack Secrets
      copy:
        src: "{{ secrets_env_file }}"
        dest: "{{ remote_stacks_dir }}/{{ stack_name }}/secrets.env"
        owner: debian
        group: docker
        mode: '0600'
      when: secrets_env_file is defined

    - name: Prepare AdGuard Configuration
      block:
        - name: Create AdGuard Config Directory
          file:
            path: "{{ remote_stacks_dir }}/{{ stack_name }}/conf"
            state: directory
            owner: debian
            group: docker
            mode: '0755'

        - name: Generate Password Hash
          debug:
            msg: "Generating hash..."
          # We use Ansible's built-in filter to hash the password from .env
          # Note: We need to pass ADGUARD_PASSWORD from the environment
          
        - name: Render AdGuardHome.yaml from Template
          template:
            src: "stacks/{{ stack_name }}/AdGuardHome.yaml.j2"
            dest: "{{ remote_stacks_dir }}/{{ stack_name }}/conf/AdGuardHome.yaml"
            owner: debian
            group: docker
            mode: '0644'
          vars:
            # Hash the password using bcrypt
            adguard_user: "{{ lookup('env', 'ADGUARD_USER') }}"
            adguard_password_hash: "{{ lookup('env', 'ADGUARD_PASSWORD') | password_hash('bcrypt') }}"

      when: stack_name == 'adguard'

    - name: Deploy Stack '{{ stack_name }}'
      shell: >
        docker compose
        {% if secrets_env_file is defined %}--env-file secrets.env{% endif %}
        up -d --remove-orphans
      args:
        chdir: "{{ remote_stacks_dir }}/{{ stack_name }}"
      register: compose_out
      changed_when: "'Created' in compose_out.stderr or 'Recreated' in compose_out.stderr"

    - name: Remove Secrets (secrets.env) for security
      file:
        path: "{{ remote_stacks_dir }}/{{ stack_name }}/secrets.env"
        state: absent
      when: secrets_env_file is defined